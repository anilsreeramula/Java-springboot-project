name: backend_latest

on:
  # push:
  #   branches:
  #     - main
   workflow_dispatch:

env:
  
  AWS_REGION: ca-central-1
  AWS_ACCOUNT_ID: 835671582299
  ECR_REPOSITORY: mybackend
  IMAGE_TAG: ${{ github.sha }}
  CONTAINER_NAME: mybackend
  CONTAINER_PORT: 8084

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # environment: dev

    permissions:
      id-token: write
      contents: read

    steps:

      # Step 1: Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials using OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::835671582299:role/OIDC_github_role
          role-session-name: GitHubActions
          aws-region: ca-central-1

      # Step 3: Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Build Docker Image
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
          .

      # Step 5: Push Docker Image to ECR
      - name: Push Docker Image to ECR
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      # Step 6: Setup SSH key for EC2
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

          ssh-keyscan -H ${{ vars.EC2_HOST }} >> ~/.ssh/known_hosts

      # Step 7: Login to EC2
      - name: Login to EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
          ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }} \
          "echo 'Connected successfully to EC2'"

      # Step 8: Pull Image from ECR and Deploy Container on EC2
      - name: Deploy Docker Container on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
          ${{ vars.EC2_USER }}@${{ vars.EC2_HOST }} << EOF

            echo "Logging into ECR..."
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login \
            --username AWS \
            --password-stdin \
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            echo "Pulling latest image..."
            docker pull \
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            echo "Stopping old container..."
            docker stop ${{ env.CONTAINER_NAME }} || true

            echo "Removing old container..."
            docker rm ${{ env.CONTAINER_NAME }} || true

            echo "Starting new container..."
            docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} \
            --restart always \
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            echo "Deployment completed successfully!"

          EOF
